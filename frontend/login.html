<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APM | Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .login-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
        }
        .login-card {
            width: 400px;
            padding: 3rem;
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 2rem;
            font-size: 2rem;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: var(--transition-smooth);
        }
        .form-group input:focus {
            border-color: var(--accent-cyan);
            background: rgba(255, 255, 255, 0.08);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-emerald));
            border: none;
            border-radius: 12px;
            color: var(--bg-dark);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: var(--transition-smooth);
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
        }
        .error-msg {
            color: var(--accent-rose);
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="background-mesh"></div>
    <div class="login-wrapper">
        <div class="login-card glass">
            <div class="logo" style="justify-content: center;">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">APM<span>OS</span></span>
            </div>
            <h2>Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">User ID</label>
                    <input type="text" id="username" placeholder="Enter your ID" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">Login System</button>
                <div id="error-msg" class="error-msg">Invalid ID or Password. Please try again.</div>
            </form>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
